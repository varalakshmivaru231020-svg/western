<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Doctor Examining Patient</title>
  <desc id="desc">Professional dentist examining and caring for patient with compassion and expertise.</desc>
  
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7f8fc"/>
      <stop offset="100%" stop-color="#cfeef8"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d5b9"/>
      <stop offset="100%" stop-color="#ecca9e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="6" stdDeviation="8" flood-color="#0a2238" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>
  
  <!-- Decorative shapes -->
  <circle cx="150" cy="100" r="80" fill="#18b4d4" opacity="0.08"/>
  <circle cx="1050" cy="750" r="120" fill="#00d4f0" opacity="0.08"/>
  
  <!-- Patient chair -->
  <rect x="400" y="450" width="400" height="200" rx="30" fill="#28bdd6" opacity="0.85" filter="url(#shadow)"/>
  <rect x="420" y="470" width="360" height="160" rx="20" fill="#3dd1e8"/>
  <ellipse cx="600" cy="630" rx="200" ry="40" fill="#1a9ab3"/>
  
  <!-- Patient body reclined -->
  <g>
    <!-- Patient torso -->
    <ellipse cx="600" cy="380" rx="90" ry="110" fill="url(#skinGrad)"/>
    
    <!-- Patient head -->
    <circle cx="600" cy="220" r="50" fill="#f4c7a0" filter="url(#shadow)"/>
    
    <!-- Patient hair -->
    <path d="M 550 190 Q 550 150 600 145 Q 650 150 650 190 Q 650 170 600 165 Q 550 170 550 190" fill="#6b4c3a"/>
    
    <!-- Patient eyes (looking upward) -->
    <circle cx="580" cy="210" r="6" fill="#333"/>
    <circle cx="620" cy="210" r="6" fill="#333"/>
    <circle cx="582" cy="208" r="2.5" fill="#fff" opacity="0.8"/>
    <circle cx="622" cy="208" r="2.5" fill="#fff" opacity="0.8"/>
    
    <!-- Patient nose -->
    <path d="M 600 210 L 598 240 L 602 240" stroke="#d4a574" stroke-width="2" fill="none"/>
    
    <!-- Patient mouth (relaxed smile) -->
    <path d="M 580 260 Q 600 275 620 260" stroke="#c88569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Patient arms on armrests -->
    <ellipse cx="480" cy="350" rx="40" ry="70" fill="url(#skinGrad)" transform="rotate(-50 480 350)"/>
    <ellipse cx="720" cy="350" rx="40" ry="70" fill="url(#skinGrad)" transform="rotate(50 720 350)"/>
  </g>
  
  <!-- Doctor figure -->
  <g>
    <!-- Doctor body (leaning toward patient) -->
    <ellipse cx="280" cy="380" rx="50" ry="80" fill="#ffffff" stroke="#18b4d4" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Doctor coat sleeves -->
    <rect x="220" y="300" width="35" height="120" rx="15" fill="#e8b896"/>
    <rect x="335" y="300" width="35" height="120" rx="15" fill="#e8b896"/>
    
    <!-- Doctor head -->
    <circle cx="280" cy="240" r="45" fill="#f4c7a0" filter="url(#shadow)"/>
    
    <!-- Doctor hair -->
    <path d="M 235 210 Q 235 175 280 170 Q 325 175 325 210 Q 325 185 280 180 Q 235 185 235 210" fill="#4a3728"/>
    
    <!-- Doctor eyes (looking at patient with focus) -->
    <circle cx="260" cy="235" r="7" fill="#333"/>
    <circle cx="300" cy="235" r="7" fill="#333"/>
    
    <!-- Doctor focused gaze lines -->
    <circle cx="263" cy="232" r="3" fill="#fff" opacity="0.9"/>
    <circle cx="303" cy="232" r="3" fill="#fff" opacity="0.9"/>
    
    <!-- Doctor eyebrows (concerned, caring) -->
    <path d="M 250 225 Q 260 220 270 225" stroke="#3a2818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 290 225 Q 300 220 310 225" stroke="#3a2818" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Doctor nose -->
    <path d="M 280 235 L 278 270 L 282 270" stroke="#d4a574" stroke-width="2" fill="none"/>
    
    <!-- Doctor mouth (professional smile) -->
    <path d="M 260 285 Q 280 300 300 285" stroke="#c88569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Doctor medical mask (partially lowered) -->
    <rect x="255" y="290" width="50" height="28" rx="5" fill="#4da6d0" opacity="0.7"/>
    <line x1="255" y1="302" x2="305" y2="302" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
    
    <!-- Doctor arms reaching toward patient -->
    <ellipse cx="180" cy="350" rx="35" ry="80" fill="#e8b896" transform="rotate(-35 180 350)"/>
    <ellipse cx="380" cy="350" rx="35" ry="80" fill="#e8b896" transform="rotate(35 380 350)"/>
    
    <!-- Doctor hands -->
    <circle cx="130" cy="400" r="22" fill="#f4c7a0" filter="url(#shadow)"/>
    <circle cx="430" cy="350" r="22" fill="#f4c7a0" filter="url(#shadow)"/>
    
    <!-- Dental mirror/tool in hand -->
    <circle cx="430" cy="350" r="14" fill="#28bdd6" opacity="0.8"/>
    <line x1="441" y1="350" x2="480" y2="330" stroke="#28bdd6" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- Examining gesture - connection line -->
  <path d="M 350 320 Q 450 280 580 250" stroke="#18b4d4" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
  
  <!-- Care indicators -->
  <!-- Heart symbol (care/compassion) -->
  <g transform="translate(750, 250)">
    <path d="M 0 5 C 0 2.5 2 0 5 0 C 8 0 10 2.5 10 5 C 10 10 0 18 0 18 C 0 18 -10 10 -10 5 C -10 2.5 -8 0 -5 0 C -2 0 0 2.5 0 5" 
          fill="#ff6b9d" opacity="0.7" transform="scale(2)"/>
  </g>
  
  <!-- Wellness indicator (checkmark) -->
  <g transform="translate(850, 300)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#18b4d4" stroke-width="2" opacity="0.5"/>
    <path d="M -10 0 L -2 8 L 15 -10" stroke="#18b4d4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>
  
  <!-- Trust/communication lines -->
  <line x1="320" y1="280" x2="550" y2="280" stroke="#00d4f0" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.4"/>
  <line x1="300" y1="340" x2="520" y2="340" stroke="#00d4f0" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.4"/>
  
  <!-- Comfort bubble -->
  <circle cx="950" cy="200" r="50" fill="none" stroke="#18b4d4" stroke-width="2" opacity="0.4"/>
  <text x="950" y="210" text-anchor="middle" fill="#18b4d4" font-family="Arial, sans-serif" font-size="32" opacity="0.6">👍</text>
  
  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="900" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="10"/>
</svg>
