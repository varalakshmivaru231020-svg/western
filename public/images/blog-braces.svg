<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGrad2)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#f39c12" opacity="0.1"/>
  <circle cx="700" cy="500" r="80" fill="#e67e22" opacity="0.1"/>
  
  <!-- Upper teeth with braces -->
  <g transform="translate(200, 180)">
    <!-- Tooth 1 -->
    <rect x="0" y="0" width="45" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="2"/>
    <circle cx="22.5" cy="35" r="6" fill="#4da6d0" stroke="#333" stroke-width="1"/>
    <line x1="15" y1="35" x2="30" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="22.5" y1="28" x2="22.5" y2="42" stroke="#888" stroke-width="2"/>
    
    <!-- Tooth 2 -->
    <rect x="50" y="0" width="45" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="2"/>
    <circle cx="72.5" cy="35" r="6" fill="#4da6d0" stroke="#333" stroke-width="1"/>
    <line x1="65" y1="35" x2="80" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="72.5" y1="28" x2="72.5" y2="42" stroke="#888" stroke-width="2"/>
    
    <!-- Tooth 3 -->
    <rect x="100" y="0" width="45" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="2"/>
    <circle cx="122.5" cy="35" r="6" fill="#4da6d0" stroke="#333" stroke-width="1"/>
    <line x1="115" y1="35" x2="130" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="122.5" y1="28" x2="122.5" y2="42" stroke="#888" stroke-width="2"/>
    
    <!-- Wire connection -->
    <path d="M 22.5 35 Q 72.5 20 122.5 35" stroke="#888" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Lower teeth with braces -->
  <g transform="translate(200, 320)">
    <!-- Tooth 1 -->
    <rect x="0" y="0" width="45" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="2"/>
    <circle cx="22.5" cy="35" r="6" fill="#4da6d0" stroke="#333" stroke-width="1"/>
    <line x1="15" y1="35" x2="30" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="22.5" y1="28" x2="22.5" y2="42" stroke="#888" stroke-width="2"/>
    
    <!-- Tooth 2 -->
    <rect x="50" y="0" width="45" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="2"/>
    <circle cx="72.5" cy="35" r="6" fill="#4da6d0" stroke="#333" stroke-width="1"/>
    <line x1="65" y1="35" x2="80" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="72.5" y1="28" x2="72.5" y2="42" stroke="#888" stroke-width="2"/>
    
    <!-- Tooth 3 -->
    <rect x="100" y="0" width="45" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="2"/>
    <circle cx="122.5" cy="35" r="6" fill="#4da6d0" stroke="#333" stroke-width="1"/>
    <line x1="115" y1="35" x2="130" y2="35" stroke="#888" stroke-width="2"/>
    <line x1="122.5" y1="28" x2="122.5" y2="42" stroke="#888" stroke-width="2"/>
    
    <!-- Wire connection -->
    <path d="M 22.5 35 Q 72.5 50 122.5 35" stroke="#888" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Smile curve showing alignment -->
  <path d="M 150 450 Q 350 520 450 450" stroke="#f39c12" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Alignment arrow -->
  <g transform="translate(500, 300)">
    <rect x="0" y="-30" width="150" height="60" rx="8" fill="#4da6d0" opacity="0.8"/>
    <text x="75" y="10" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">ALIGNMENT</text>
    <polygon points="160,-10 180,0 160,10" fill="#4da6d0" opacity="0.8"/>
  </g>
  
  <!-- Success checkmark -->
  <g transform="translate(550, 150)">
    <circle cx="0" cy="0" r="40" fill="#4caf50" opacity="0.8"/>
    <path d="M -15 0 L -5 10 L 15 -10" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>