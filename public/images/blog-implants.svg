<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGrad3)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#9c27b0" opacity="0.1"/>
  <circle cx="700" cy="500" r="80" fill="#7b1fa2" opacity="0.1"/>
  
  <!-- Jawbone structure -->
  <g transform="translate(150, 250)">
    <path d="M 0 50 L 50 0 L 100 0 L 150 50 L 150 100 L 0 100 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="2"/>
  </g>
  
  <!-- Implant post -->
  <g transform="translate(250, 200)">
    <!-- Titanium screw/post -->
    <rect x="0" y="0" width="15" height="120" fill="#c0c0c0" stroke="#808080" stroke-width="2"/>
    <circle cx="7.5" cy="0" r="8" fill="#d0d0d0" stroke="#808080" stroke-width="2"/>
    <line x1="0" y1="20" x2="15" y2="20" stroke="#808080" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="40" x2="15" y2="40" stroke="#808080" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="60" x2="15" y2="60" stroke="#808080" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="80" x2="15" y2="80" stroke="#808080" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Crown on top -->
  <g transform="translate(240, 120)">
    <!-- Crown body -->
    <rect x="0" y="0" width="35" height="60" rx="3" fill="#e8d4af" stroke="#c4a962" stroke-width="2"/>
    <!-- Crown shine -->
    <ellipse cx="17.5" cy="20" rx="8" ry="10" fill="#fff" opacity="0.4"/>
  </g>
  
  <!-- Healthy bone around implant -->
  <g transform="translate(220, 280)">
    <ellipse cx="35" cy="20" rx="40" ry="30" fill="#90ee90" opacity="0.4" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Natural teeth on sides -->
  <!-- Left tooth -->
  <g transform="translate(100, 240)">
    <rect x="0" y="0" width="40" height="80" rx="3" fill="#ffffff" stroke="#ddd" stroke-width="2"/>
    <path d="M 20 0 L 5 30 L 3 80 L 40 80 L 38 30 Z" fill="#f5f5f5" opacity="0.5"/>
  </g>
  
  <!-- Right tooth -->
  <g transform="translate(330, 240)">
    <rect x="0" y="0" width="40" height="80" rx="3" fill="#ffffff" stroke="#ddd" stroke-width="2"/>
    <path d="M 20 0 L 35 30 L 37 80 L 0 80 L 2 30 Z" fill="#f5f5f5" opacity="0.5"/>
  </g>
  
  <!-- Smile with complete teeth -->
  <path d="M 80 400 Q 250 450 380 400" stroke="#7b1fa2" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Integration indicator -->
  <g transform="translate(500, 280)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#9c27b0" stroke-width="3" opacity="0.5"/>
    <text x="0" y="70" text-anchor="middle" fill="#7b1fa2" font-size="16" font-weight="bold">INTEGRATION</text>
  </g>
  
  <!-- Benefits list -->
  <g transform="translate(500, 150)">
    <text x="0" y="0" fill="#7b1fa2" font-size="18" font-weight="bold">✓ Permanent</text>
    <text x="0" y="35" fill="#7b1fa2" font-size="18" font-weight="bold">✓ Natural Look</text>
    <text x="0" y="70" fill="#7b1fa2" font-size="18" font-weight="bold">✓ Durable</text>
  </g>
</svg>