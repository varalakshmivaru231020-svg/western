<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="invisalignGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="invisalignIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#invisalignGrad)"/>
  
  <!-- Clear aligner visualization -->
  <g transform="translate(150, 80)">
    <circle cx="150" cy="120" r="110" fill="url(#invisalignIcon)" opacity="0.15"/>
    <!-- Aligner trays -->
    <path d="M 120 100 Q 100 110 120 130 Q 140 140 160 130 Q 180 140 200 130 Q 220 110 200 100 Q 180 95 160 95 Q 140 95 120 100" 
          fill="none" stroke="url(#invisalignIcon)" stroke-width="2" opacity="0.8"/>
    <path d="M 115 135 Q 95 145 115 165 Q 135 175 155 165 Q 175 175 195 165 Q 215 145 195 135 Q 175 130 155 130 Q 135 130 115 135" 
          fill="none" stroke="url(#invisalignIcon)" stroke-width="2" opacity="0.6"/>
    <!-- Shine effect -->
    <ellipse cx="140" cy="100" rx="12" ry="8" fill="white" opacity="0.4"/>
  </g>
  
  <!-- Check marks -->
  <text x="420" y="140" font-size="36" fill="url(#invisalignIcon)">✓</text>
  <text x="420" y="200" font-size="36" fill="url(#invisalignIcon)">✓</text>
  
  <!-- Text -->
  <text x="300" y="350" font-family="Arial, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1565C0">
    Invisalign Treatment
  </text>
</svg>