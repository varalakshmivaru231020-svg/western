<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="blogGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#blogGradient4)"/>
  
  <!-- Shield with tick -->
  <g transform="translate(130, 60)">
    <circle cx="170" cy="130" r="110" fill="url(#iconGradient4)" opacity="0.2"/>
    <!-- Shield -->
    <path d="M 170 80 L 130 100 L 130 150 Q 130 190 170 210 Q 210 190 210 150 L 210 100 Z" 
          fill="url(#iconGradient4)" stroke="#1B5E20" stroke-width="2"/>
    <!-- Checkmark -->
    <path d="M 150 140 L 165 155 L 190 120" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Tooth icon in corner -->
  <path d="M 450 80 Q 445 65 460 55 Q 475 65 470 80 L 470 130 Q 470 140 460 145 Q 450 140 450 130 Z" 
        fill="url(#iconGradient4)" opacity="0.4"/>
  
  <!-- Decorative drops -->
  <circle cx="100" cy="280" r="15" fill="url(#iconGradient4)" opacity="0.3"/>
  <circle cx="500" cy="320" r="20" fill="url(#iconGradient4)" opacity="0.25"/>
  
  <!-- Text -->
  <text x="300" y="350" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#2E7D32">
    Preventive Care
  </text>
</svg>