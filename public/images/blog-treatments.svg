<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="blogGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C27B0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#blogGradient2)"/>
  
  <!-- Tooth with treatment icon -->
  <g transform="translate(150, 80)">
    <circle cx="150" cy="120" r="100" fill="url(#iconGradient2)" opacity="0.2"/>
    <path d="M 130 80 Q 120 60 150 40 Q 180 60 170 80 L 170 160 Q 170 180 150 190 Q 130 180 130 160 Z" 
          fill="url(#iconGradient2)" stroke="#6A1B9A" stroke-width="2"/>
    <!-- Plus sign -->
    <line x1="150" y1="110" x2="150" y2="150" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="130" x2="170" y2="130" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="450" cy="100" r="30" fill="url(#iconGradient2)" opacity="0.3"/>
  <circle cx="500" cy="300" r="25" fill="url(#iconGradient2)" opacity="0.2"/>
  
  <!-- Text -->
  <text x="300" y="350" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#7B1FA2">
    Dental Treatments
  </text>
</svg>